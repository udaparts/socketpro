    <script type="text/javascript">

        var RACKSPACE = function (defaultUrl) {
            var me = {
                connect: function (url, onMsg, onRes, onClose) {
                    var s = io.connect(url || defaultUrl);
                    s.on('message', onMsg);
                    s.on('res', onRes);
                    s.on('disconnect', onClose);
                    s.sendMessage = function (msg, groups) {
                        if (!groups || !groups.splice)
                            groups = [];
                        s.emit('sendMessage', { msg: msg, groups: groups });
                    };
                    s.exit = function () {
                        s.emit('exit', {});
                        delete s.userId;
                    };
                    s.enter = function (userId, groups) {
                        if (!groups || !groups.splice)
                            groups = [];
                        userId = userId + '';
                        if (userId.toLowerCase() == (s.userId + '').toLowerCase())
                            throw 'Bad operation with bad user id'
                        s.userId = userId;
                        var obj = { userId: userId, groups: groups };
                        s.emit('enter', obj);
                    };

                    s.sendUserMessage = function (userId, msg) {
                        s.emit('sendUserMessage', { userId: userId + '', msg: msg + '' });
                    };

                    return s;
                }
            };
            return me;
        } ();

        var cs = RACKSPACE.connect('http://localhost:20901',
            function (data) {
                console.log(JSON.stringify(data));
            },

            function (data) {
                console.log(JSON.stringify(data));
            },

            function () {
                console.log('Socket closed for ' + this.userId);
            }
        );
        
        function makeGroups() {
            var groups = document.getElementById('txtGroups').value.split(',');
            var n, len = groups.length;
            for (n = 0; n < len; ++n) {
                groups[n] = parseInt(groups[n]);
            }
            return groups;
        }

        function btnB2S_onclick() {
            var str = document.getElementById('txtMsg').value;
            cs.sendMessage(str, makeGroups());
        }

        function btnEnter_onclick() {
            cs.enter(document.getElementById('txtUserId').value, makeGroups());
        }

        function btnExit_onclick() {
            cs.exit();
        }

        function btnSendUser_onclick() {
            cs.sendUserMessage(document.getElementById('txtUserId').value, document.getElementById('txtMsg').value);
        }

    </script>
