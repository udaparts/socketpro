
<script type="text/javascript">
function createAjaxObject()
{
    var xmlHttp;
    try
    {
        xmlHttp = new XMLHttpRequest(); // Firefox, Opera 8.0+, Safari
    }
    catch(e)
    {
        // Internet Explorer
        try
        {
            xmlHttp = new ActiveXObject("Msxml2.XMLHTTP");
        }
        catch (e)
        {
            xmlHttp = new ActiveXObject("Microsoft.XMLHTTP");
        }
    }
    return xmlHttp;
}



</script>

<script language="javascript" type="text/javascript">

var xmlHttp;
function handleContent(event)
{
    var txt = document.getElementById('txtResult');
    if(event && event.target && event.target.responseXML && event.target.responseXML.firstChild && event.target.responseXML.firstChild.firstChild)
    {
        txt.value = event.target.responseXML.firstChild.firstChild.nodeValue;
        if(txt.value == 'Ended')
        {
            var btn = document.getElementById('btnSend');
            btn.disabled = false;
        }
    }
}

function btnSend_onclick() {
    var btn = document.getElementById('btnSend');
    btn.disabled = true;
    xmlHttp = new createAjaxObject();
    xmlHttp.multipart = true;
    xmlHttp.open("GET", "/mpart", true);
    xmlHttp.onload = handleContent;
    xmlHttp.send(null);
}
</script>
