<script type="text/javascript">

//set up message listening
UChat.onMessage = function onMessage(req, msg) {
    document.getElementById('txtMsgIn').value = UJSON.stringify(msg);
    switch (req.method) {
        case 'exit':
            myInit();
            break;
        case 'enter':
            if (UChat.chatting()) {
                document.getElementById("btnSendUserMessage").disabled = '';
                document.getElementById("btnSpeak").disabled = '';
                document.getElementById("btnSubscribe").disabled = 'disabled';
            }
            break;
        default:
            break;
    }
};

function myInit() {
    //make sure controls have a correct initial state
    document.getElementById("btnSendUserMessage").disabled = 'disabled';
    document.getElementById("btnSpeak").disabled = 'disabled';
    document.getElementById("btnSubscribe").disabled = '';
}

function btnSpeak_onclick() {
    var chatGroups = document.getElementById('txtGroups').value.split(',');
    var req = UChat.speak(document.getElementById('txtMsgOut').value, //message
        chatGroups
    );
}

function btnSendUserMessage_onclick() {
    var req = UChat.sendUserMessage(document.getElementById('txtMsgOut').value, //message
    document.getElementById('txtUser').value //user id
    );
}

function btnSubscribe_onclick() {
    document.getElementById("btnSubscribe").disabled = 'disabled';
    var ctrl = document.getElementById('txtUserId');
    var req = UChat.enter(ctrl.value, //user id
    [1,2,8] //chat groups
    );
}

function btnUnsubscribe_onclick() {
    var req = UChat.exit();
}
</script>
